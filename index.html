<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Валюты | TG Stars & PUBG UC</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --tg-color: #38bdf8;
            --pubg-color: #fb923c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 50px;
        }

        /* Шапка и Корзина */
        header {
            background-color: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(to right, var(--tg-color), var(--pubg-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cart-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-btn:hover {
            background-color: var(--primary-hover);
            transform: scale(1.05);
        }

        /* Контент */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .section-title {
            margin: 40px 0 20px;
            font-size: 32px;
            text-align: center;
        }

        .tg-title { color: var(--tg-color); }
        .pubg-title { color: var(--pubg-color); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        /* Карточки товаров */
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border-color: var(--primary-color);
        }

        .item-amount {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .item-price {
            font-size: 20px;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .add-btn {
            background-color: transparent;
            color: var(--text-color);
            border: 2px solid var(--primary-color);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            width: 100%;
        }

        .add-btn:hover {
            background-color: var(--primary-color);
        }

        /* Модальное окно корзины */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.3s forwards;
        }

        .modal-content {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            border: 1px solid #334155;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 24px;
            cursor: pointer;
        }

        .cart-items {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #334155;
        }
        
        .remove-btn {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .cart-total {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: right;
        }

        .checkout-btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .checkout-btn:hover {
            background-color: #059669;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Why69 shop</div>
        <button class="cart-btn" onclick="openCart()">
            🛒 Корзина (<span id="cart-count">0</span>)
        </button>
    </header>

    <div class="container">
        <!-- Telegram Stars Section -->
        <h2 class="section-title tg-title">Telegram Stars ⭐️</h2>
        <div class="grid" id="tg-grid">
            <!-- Сюда вставляются карточки TG -->
        </div>

        <!-- PUBG UC Section -->
        <h2 class="section-title pubg-title">PUBG UC 🎮</h2>
        <div class="grid" id="pubg-grid">
            <!-- Сюда вставляются карточки PUBG -->
        </div>
    </div>

    <!-- Модальное окно корзины -->
    <div class="modal-overlay" id="cart-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Ваш заказ</h2>
                <button class="close-btn" onclick="closeCart()">✖</button>
            </div>
            <div class="cart-items" id="cart-items-list">
                <!-- Товары в корзине -->
            </div>
            <div class="cart-total">
                Итого: <span id="total-price">0</span> ₽
            </div>
            <button class="checkout-btn" onclick="checkout()">Оформить заказ через Telegram</button>
        </div>
    </div>

    <script>
        // База данных товаров
        const tgStars = [
            { amount: 50, price: 90 },
            { amount: 100, price: 160 },
            { amount: 150, price: 240 },
            { amount: 250, price: 400 },
            { amount: 350, price: 560 },
            { amount: 500, price: 800 },
            { amount: 750, price: 1200 },
            { amount: 1000, price: 1600 },
            { amount: 1500, price: 2400 },
            { amount: 5000, price: 9000 }
        ];

        const pubgUc = [
            { amount: 60, price: 80 },
            { amount: 120, price: 160 },
            { amount: 325, price: 400 },
            { amount: 660, price: 840 },
            { amount: 1800, price: 2100 },
            { amount: 3850, price: 4000 }
        ];

        let cart = [];

        // Рендер карточек товаров
        function renderProducts() {
            const tgGrid = document.getElementById('tg-grid');
            const pubgGrid = document.getElementById('pubg-grid');

            tgStars.forEach(item => {
                tgGrid.innerHTML += `
                    <div class="card">
                        <div class="item-amount">⭐️ ${item.amount} Stars</div>
                        <div class="item-price">${item.price} ₽</div>
                        <button class="add-btn" onclick="addToCart('Telegram Stars', ${item.amount}, ${item.price})">Добавить в корзину</button>
                    </div>
                `;
            });

            pubgUc.forEach(item => {
                pubgGrid.innerHTML += `
                    <div class="card">
                        <div class="item-amount">🎮 ${item.amount} UC</div>
                        <div class="item-price">${item.price} ₽</div>
                        <button class="add-btn" onclick="addToCart('PUBG UC', ${item.amount}, ${item.price})">Добавить в корзину</button>
                    </div>
                `;
            });
        }

        // Добавление в корзину
        function addToCart(type, amount, price) {
            cart.push({ type, amount, price });
            updateCartUI();
            
            // Легкая анимация кнопки корзины
            const cartBtn = document.querySelector('.cart-btn');
            cartBtn.style.transform = 'scale(1.1)';
            setTimeout(() => cartBtn.style.transform = 'scale(1)', 200);
        }

        // Удаление из корзины
        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        // Обновление интерфейса корзины
        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            
            const cartList = document.getElementById('cart-items-list');
            cartList.innerHTML = '';
            
            let total = 0;
            
            cart.forEach((item, index) => {
                total += item.price;
                cartList.innerHTML += `
                    <div class="cart-item">
                        <div>${item.type} (${item.amount})</div>
                        <div>${item.price} ₽ <button class="remove-btn" onclick="removeFromCart(${index})">X</button></div>
                    </div>
                `;
            });

            document.getElementById('total-price').innerText = total;
            
            if (cart.length === 0) {
                cartList.innerHTML = '<p style="text-align:center; color:#94a3b8;">Корзина пуста</p>';
            }
        }

        // Управление модальным окном
        function openCart() {
            document.getElementById('cart-modal').classList.add('active');
        }

        function closeCart() {
            document.getElementById('cart-modal').classList.remove('active');
        }

        // Оформление заказа и отправка в Telegram
        function checkout() {
            if (cart.length === 0) {
                alert("Ваша корзина пуста! Добавьте товары для заказа.");
                return;
            }

            let message = "👋 Привет! Хочу сделать заказ:\n\n";
            let total = 0;

            cart.forEach(item => {
                message += `▪️ ${item.type} — ${item.amount} шт. (${item.price} ₽)\n`;
                total += item.price;
            });

            message += `\n💰 Итого к оплате: ${total} ₽\n\nЖду реквизиты для оплаты!`;

            // Твой юзернейм
            const telegramUsername = "why69hockey";
            
            // Кодируем текст для URL и открываем ссылку
            const encodedMessage = encodeURIComponent(message);
            window.open(`https://t.me/${telegramUsername}?text=${encodedMessage}`, '_blank');
        }

        // Инициализация
        renderProducts();
        updateCartUI();
    </script>
</body>
</html>
